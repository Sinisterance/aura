<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup — Aura</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --accent: #7c3aed;
      --accent-light: #9d5ff3;
      --bg-primary: #07070d;
      --text-primary: #f0f0ff;
      --text-secondary: #8888aa;
      --text-muted: #55556a;
      --border: rgba(255,255,255,0.08);
      --success: #10b981;
      --danger: #ef4444;
      --font-main: 'Inter', system-ui, sans-serif;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-main);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .setup-card {
      background: rgba(13,13,26,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      backdrop-filter: blur(30px);
    }
    .setup-header { text-align: center; margin-bottom: 32px; }
    .setup-icon { font-size: 2.5rem; color: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); margin-bottom: 12px; display: block; }
    h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    p { color: var(--text-secondary); font-size: 0.9rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 0.875rem;
      font-family: var(--font-main);
      outline: none;
      width: 100%;
      transition: all 0.3s;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(124,58,237,0.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.3);
    }
    input::placeholder { color: var(--text-muted); }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--font-main);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-top: 16px;
      display: none;
    }
    .alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .alert.show { display: block; }
    .info-box {
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .info-box strong { color: var(--accent-light); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .invite-list { margin-top: 24px; }
    .invite-list h3 { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; }
    .invite-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
    }
    .code { color: var(--accent-light); font-weight: 700; letter-spacing: 2px; }
    .copy-btn {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 6px;
      color: var(--accent-light);
      font-size: 0.75rem;
      padding: 4px 10px;
      cursor: pointer;
      font-family: var(--font-main);
    }
    .copy-btn:hover { background: rgba(124,58,237,0.2); }
    .go-home { display: block; text-align: center; color: var(--accent-light); text-decoration: none; font-size: 0.85rem; margin-top: 20px; }
    .go-home:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="setup-header">
      <span class="setup-icon">✦</span>
      <h1>Aura Setup</h1>
      <p>Create your first admin account to get started</p>
    </div>

    <div class="info-box">
      <strong>Available Invite Codes:</strong> WELCOME1 · WELCOME2 · BETA001 · AURA2024<br>
      Use any of these codes to register your admin account.
    </div>

    <form id="setupForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="setupUsername" placeholder="admin" value="admin" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="setupEmail" placeholder="admin@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="setupPassword" placeholder="Min. 8 characters" required />
      </div>
      <div class="form-group">
        <label>Invite Code</label>
        <input type="text" id="setupInvite" placeholder="WELCOME1" value="WELCOME1" style="text-transform:uppercase;letter-spacing:2px;" required />
      </div>
      <button type="submit" class="btn" id="setupBtn">
        <i class="fas fa-magic"></i> Create Admin Account
      </button>
    </form>

    <div class="alert" id="setupAlert"></div>

    <div class="invite-list">
      <h3> Invite Codes to Share</h3>
      <div class="invite-item"><span class="code">WELCOME1</span><button class="copy-btn" onclick="copyInvite('WELCOME1')">Copy</button></div>
      <div class="invite-item"><span class="code">WELCOME2</span><button class="copy-btn" onclick="copyInvite('WELCOME2')">Copy</button></div>
      <div class="invite-item"><span class="code">BETA001</span><button class="copy-btn" onclick="copyInvite('BETA001')">Copy</button></div>
      <div class="invite-item"><span class="code">AURA2024</span><button class="copy-btn" onclick="copyInvite('AURA2024')">Copy</button></div>
    </div>

    <a href="index.html" class="go-home">← Back to Aura Home</a>
  </div>

  <script src="js/api.js"></script>
  <script>
    function copyInvite(code) {
      navigator.clipboard.writeText(code).then(() => {
        alert('Copied: ' + code);
      });
    }

    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('setupBtn');
      const alert = document.getElementById('setupAlert');
      alert.className = 'alert';
      alert.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

      try {
        const username = document.getElementById('setupUsername').value.trim();
        const email = document.getElementById('setupEmail').value.trim();
        const password = document.getElementById('setupPassword').value;
        const inviteCode = document.getElementById('setupInvite').value.trim();

        // Register user
        const { user } = await AuraAPI.register({ username, email, password, inviteCode });

        // Promote to admin
        await AuraAPI.updateUser(user.id, { role: 'admin' });

        alert.textContent = '✓ Admin account created! Redirecting to dashboard...';
        alert.className = 'alert success show';
        btn.innerHTML = '<i class="fas fa-check"></i> Done!';

        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (err) {
        alert.textContent = '✗ ' + err.message;
        alert.className = 'alert error show';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-magic"></i> Create Admin Account';
      }
    });
  </script>
</body>
</html>
